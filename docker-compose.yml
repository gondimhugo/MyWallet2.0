services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: mywallet
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/mywallet
      SECRET_KEY: super-secret
      CORS_ORIGINS: http://localhost:5173
    ports: ["8000:8000"]
    depends_on: [db]
    command: bash -lc "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build: ./frontend
    environment:
      VITE_API_URL: http://localhost:8000/api
    ports: ["5173:5173"]
    depends_on: [backend]

volumes:
  pgdata:
