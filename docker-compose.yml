services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.example
    volumes:
      - ./backend:/app
      - gastos_db:/app/data
    command: >
      bash -lc "python -m app.db.init_db &&
               uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env.example
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
    command: >
      bash -lc "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

volumes:
  gastos_db:
