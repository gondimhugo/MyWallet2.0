services:
  - type: web
    name: mywallet-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: oregon
    healthCheckPath: /health
    # Aplica as migrações antes de subir o uvicorn.
    dockerCommand: bash -lc "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mywallet-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        sync: false  # defina no painel: URL do frontend (ex: https://mywallet-frontend.onrender.com)

databases:
  - name: mywallet-db
    plan: free
    region: oregon
    databaseName: mywallet_os4m
    user: admin
