services:
  - type: web
    name: mywallet-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: oregon
    healthCheckPath: /health
    # O start script aplica `alembic upgrade head` e em seguida sobe o uvicorn.
    # Mantemos a lógica em backend/start.sh para evitar problemas de quoting
    # do dockerCommand (que tratava o `&&` como parte do nome do comando).
    dockerCommand: /app/start.sh
    envVars:
      # Use a URL INTERNA do seu Postgres no Render
      # (ex: postgresql://admin:senha@dpg-xxxxxxxxxxxxxxxxxxxx-a/mywallet_os4m)
      - key: DATABASE_URL
        sync: false
      # Chave de assinatura JWT — gerada automaticamente pelo Render
      - key: SECRET_KEY
        generateValue: true
      # Opcional: lista separada por vírgula de origens explícitas
      # (o backend já aceita *.vercel.app via CORS_ORIGIN_REGEX por padrão)
      - key: CORS_ORIGINS
        sync: false
